name: Generate PDF For Vitepress
run-name: 'Generate PDF: ${{ inputs.product }} ${{ inputs.version }} (${{ inputs.lang }})'

on:
  workflow_dispatch:
    inputs:
      product:
        required: true
        type: string
        description: "Product name"
      version:
        required: true
        type: string
        description: "Product version: vx.y or latest"
      lang:
        required: true
        type: string
        description: "Language: zh en"

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          sudo fc-cache -fv

      - name: Generate PDF
        env:
          PYTHONUNBUFFERED: 1
        run: |
          uv run python main.py \
            --product ${{ inputs.product }} \
            --version ${{ inputs.version }} \
            --lang ${{ inputs.lang }}

      - name: Upload pdf
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.product }}-${{ inputs.version }}-${{ inputs.lang }}.pdf
          path: ./*.pdf
