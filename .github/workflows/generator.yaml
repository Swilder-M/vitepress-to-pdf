name: Generate PDF For Vitepress

on:
  workflow_dispatch:
    inputs:
      product:
        required: true
        type: string
        description: "Product name"
      version:
        required: true
        type: string
        description: "Product version: vx.y or latest"
      lang:
        required: true
        type: string
        description: "Language: zh en"

jobs:
  generate-pdf:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Install wkhtmltopdf, Chinese fonts and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb fonts-noto-cjk fonts-noto-cjk-extra fonts-wqy-microhei fonts-wqy-zenhei \
            fonts-arphic-ukai fonts-arphic-uming fonts-droid-fallback \
            xfonts-wqy language-pack-zh* fontconfig
          sudo fc-cache -fv

      - name: Generate PDF
        env:
          PYTHONUNBUFFERED: 1
        run: |
          xvfb-run uv run python main.py \
            --product ${{ inputs.product }} \
            --version ${{ inputs.version }} \
            --lang ${{ inputs.lang }}

      - name: Upload pdf
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.product }}-${{ inputs.version }}-${{ inputs.lang }}.pdf
          path: ./*.pdf
