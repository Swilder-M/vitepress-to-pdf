name: Generate PDF For Vitepress

on:
  workflow_dispatch:
    inputs:
      product:
        required: true
        type: string
        description: "Product name"
      version:
        required: true
        type: string
        description: "Product version: vx.y or latest"
      lang:
        required: true
        type: string
        description: "Language: zh en"

jobs:
  generate-pdf:
    runs-on: ubuntu-22.04
    container:
      image: debian:buster
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sed -i 's|http://deb.debian.org/debian|http://archive.debian.org/debian|g' /etc/apt/sources.list
          sed -i '/debian-security/d' /etc/apt/sources.list
          apt-get update
          apt-get install -y curl git ca-certificates \
            fonts-noto-cjk fonts-wqy-microhei fonts-wqy-zenhei \
            fonts-arphic-ukai fonts-arphic-uming fonts-droid-fallback \
            xfonts-wqy fontconfig
          curl -sL -o wkhtmltox.deb https://github.com/wkhtmltopdf/wkhtmltopdf/releases/download/0.12.5/wkhtmltox_0.12.5-1.buster_amd64.deb
          apt-get install -y ./wkhtmltox.deb
          fc-cache -fv

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Generate PDF
        env:
          PYTHONUNBUFFERED: 1
        run: |
          uv run python main.py \
            --product ${{ inputs.product }} \
            --version ${{ inputs.version }} \
            --lang ${{ inputs.lang }}

      - name: Upload pdf
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.product }}-${{ inputs.version }}-${{ inputs.lang }}.pdf
          path: ./*.pdf
